<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What is IMA?</title>
    <style>
        body {
            background-color: #111;
            color: white;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        
        /* 拼贴容器 */
        .collage-container {
            position: relative;
            text-align: center;
        }

        /* 单词基础样式 */
        .word {
            font-size: 6rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.4s ease;
            display: inline-block;
            margin: 0 10px;
        }

        /* 模拟拼贴的不同字体和倾斜 */
        #word-interactive { font-family: 'Courier New', monospace; transform: rotate(-2deg); }
        #word-media { font-family: 'Arial Black', sans-serif; transform: rotate(1deg); }
        #word-arts { font-family: 'Georgia', serif; font-style: italic; transform: rotate(-3deg); }

        /* 中文副标题 */
        .zh-subtitle {
            font-size: 1.5rem;
            display: block;
            opacity: 0.7;
            font-style: normal;
        }

        /* 悬停时的其他单词变暗 */
        .collage-container:hover .word {
            opacity: 0.1;
            filter: blur(2px);
        }

        /* 悬停时的当前单词高亮 */
        .collage-container .word:hover {
            opacity: 1;
            filter: blur(0);
            transform: scale(1.1) rotate(0deg);
        }

        /* 语录展示区 */
        #quote-display {
            position: absolute;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            width: 80vw;
            font-size: 1.2rem;
            line-height: 1.6;
            opacity: 0;
            transition: opacity 0.5s ease;
            color: #ddd;
        }
    </style>
</head>
<body>

    <div class="collage-container">
        <div class="word" id="word-interactive" data-quote="“我觉得最核心的是交互，万物皆可交互。” — Magnus <br> “交互在中文里太窄了，听起来像做 UI 的。” — Cecilia">
            INTERACTIVE <span class="zh-subtitle">交互</span>
        </div>
        
        <div class="word" id="word-media" data-quote="“Media 更接近新闻传媒，我高中以为是去电视台的。” — Rebecca <br> “媒体就是通过新闻等渠道传播出去。” — 爷爷">
            MEDIA <span class="zh-subtitle">媒体</span>
        </div>
        
        <div class="word" id="word-arts" data-quote="“在中国，家长不想为莫名其妙的艺术买单。” — Rebecca <br> “学艺术可以提高素养，做生意时显得素质高些。” — 爷爷">
            ARTS <span class="zh-subtitle">艺术</span>
        </div>

        <div id="quote-display"></div>
    </div>

    <script>
        const words = document.querySelectorAll('.word');
        const quoteDisplay = document.getElementById('quote-display');

        words.forEach(word => {
            word.addEventListener('mouseenter', () => {
                // 显示对应的语录
                quoteDisplay.innerHTML = word.getAttribute('data-quote');
                quoteDisplay.style.opacity = '1';
                
                // 这里未来可以加上一行代码，播放对应的音频文件
                // audio.play();
            });

            word.addEventListener('mouseleave', () => {
                // 鼠标移开，隐藏语录
                quoteDisplay.style.opacity = '0';
                
                // audio.pause();
            });
        });
    </script>
</body>
</html>