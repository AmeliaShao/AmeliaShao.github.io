<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMA Guestbook | The Feedback Lab</title>
    <style>
        body {
            background-color: #050505;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 50px 20px;
            overflow-x: hidden;
        }

        .back-nav {
            position: fixed;
            top: 30px;
            left: 30px;
            z-index: 100;
            display: block;
            padding: 8px;
            cursor: pointer;
            transform: rotate(-7deg);
            transition: all 0.3s ease-out;
        }

        .back-nav img {
            width: 140px;
            height: auto;
            display: block;
        }

        .back-nav:hover {
            transform: rotate(0deg) scale(1.1);
        }

        .header {
            width: 100%;
            text-align: center;
            margin-top: 60px;
            margin-bottom: 40px;
        }

        .form-container {
            background: #1a1a1a;
            padding: 30px;
            border: 2px dashed #444;
            width: 100%;
            max-width: 600px;
            z-index: 10;
            margin: 0 auto 50px auto;
            text-align: left;
        }

        /* —————— 🌟 新增：视频提示框样式 —————— */
        .video-reminder {
            background: #111;
            border-left: 4px solid #ffff00;
            padding: 12px 15px;
            margin-bottom: 25px;
            font-size: 0.9rem;
            color: #ccc;
            font-family: 'Courier New', Courier, monospace;
        }

        .video-reminder span {
            color: #ffff00;
            font-weight: bold;
            margin-right: 10px;
           /* animation: blink 1.5s infinite; *//* 闪烁动画 */
        }

        .video-reminder a {
            color: #fff;
            text-decoration: underline;
            text-decoration-style: dashed;
            text-underline-offset: 4px;
            transition: color 0.3s;
        }

        .video-reminder a:hover {
            color: #ffff00;
        }

        @keyframes blink { 
            50% { opacity: 0; } 
        }
        /* ———————————————————————————————— */

        .poll-question {
            margin-bottom: 20px;
            font-size: 1.1rem;
        }

        .poll-options {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .poll-btn {
            flex: 1;
            padding: 10px;
            border: 1px solid #006b59;
            background: transparent;
            color: #ffffff;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }

        .poll-btn.active {
            background: #006b59;
            color: #ffffff;
            font-weight: bold;
        }

        textarea {
            width: 100%;
            height: 100px;
            background: #000;
            color: #fff;
            border: 1px solid #444;
            padding: 10px;
            font-family: inherit;
            box-sizing: border-box;
            margin-bottom: 20px;
            resize: none;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: transparent;
            color: #fff;
            border: 1px solid #006b59;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
            text-transform: uppercase;
        }

        .submit-btn:hover {
            background: #006b59;
        }

        #message-wall {
            position: relative;
            width: 100%;
            max-width: 1200px;
            min-height: 400px;
            margin: 0 auto;
        }

        .note {
            position: absolute;
            width: 200px;
            padding: 15px;
            background: #e6e6e6;
            color: #000;
            box-shadow: 5px 5px 15px rgba(0, 0, 0, 0.5);
            font-size: 0.9rem;
            word-wrap: break-word;
            transition: transform 0.3s;
        }

        .note:hover {
            transform: scale(1.1) rotate(0deg) !important;
            z-index: 100;
        }

        .note .choice {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            text-transform: uppercase;
            font-size: 0.7rem;
            border-bottom: 1px solid #ccc;
        }

        .scroll-hint {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.8rem;
            font-weight: bold;
            letter-spacing: 2px;
            z-index: 999;
            pointer-events: none;
            background: rgba(5, 5, 5, 0.7);
            padding: 10px 20px;
            border: 1px dashed #444;
        }

        .scroll-hint span {
            display: block;
            font-size: 1.2rem;
            margin-top: 5px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }

        .scroll-hint.hidden {
            opacity: 0;
            transition: opacity 0.5s ease;
        }
    </style>
</head>

<body>

    <a href="home.html" class="back-nav"><img src="home.png" alt="Home"></a>

    <div class="header">
        <h1>THE GUESTBOOK</h1>
        </div>
    
    <div class="form-container">
        <div class="video-reminder">
            <span>[ NOTICE ]</span> Please <a href="video.html">CLICK HERE</a> if you haven't watch the video.
        </div>

        <div class="poll-question">After watching this, IMA is...</div>
        <div class="poll-options">
            <button class="poll-btn" onclick="setChoice('CLEARER')">CLEARER</button>
            <button class="poll-btn" onclick="setChoice('BLURRIER')">BLURRIER</button>
        </div>

        <textarea id="comment" placeholder="Explain why? (or just leave whatever comment you have)"></textarea>
        <button class="submit-btn" onclick="saveMessage()">SUBMIT</button>
    </div>

    <div id="message-wall"></div>
    
    <div class="scroll-hint" id="scrollHint">
        SCROLL DOWN TO VIEW OTHERS' THOUGHTS
        <span>↓</span>
    </div>

    <script>
        let currentChoice = "";

        function setChoice(val) {
            currentChoice = val;
            document.querySelectorAll('.poll-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.innerText === val) btn.classList.add('active');
            });
        }

        function saveMessage() {
            const comment = document.getElementById('comment').value;
            if (!currentChoice) { alert("Please pick an option first!"); return; }

            const newMessage = {
                choice: currentChoice,
                text: comment,
                left: Math.random() * 80 + "%",
                top: Math.random() * 300 + "px",
                rotate: (Math.random() * 20 - 10) + "deg"
            };

            let history = JSON.parse(localStorage.getItem('ima_messages')) || [];
            history.push(newMessage);
            localStorage.setItem('ima_messages', JSON.stringify(history));

            document.getElementById('comment').value = "";
            renderMessages();
        }

        function renderMessages() {
            const wall = document.getElementById('message-wall');
            const history = JSON.parse(localStorage.getItem('ima_messages')) || [];
            wall.innerHTML = "";

            history.forEach(msg => {
                const note = document.createElement('div');
                note.className = 'note';
                note.style.left = msg.left;
                note.style.top = msg.top;
                note.style.transform = `rotate(${msg.rotate})`;

                if (msg.choice === 'CLEARER') note.style.background = "#fff";
                else note.style.background = "#ffff88";

                note.innerHTML = `
                    <span class="choice">${msg.choice}</span>
                    ${msg.text}
                `;
                wall.appendChild(note);
            });
        }

        window.onload = renderMessages;

        window.onscroll = function () {
            const hint = document.getElementById('scrollHint');
            if (window.scrollY > 100) { 
                hint.style.opacity = "0";
            } else {
                hint.style.opacity = "1";
            }
        };
    </script>
</body>

</html>
