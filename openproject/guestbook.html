<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMA Guestbook | The Feedback Lab</title>
    <style>
        body {
            background-color: #050505;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* 🌟 确保 body 的直接子元素水平居中 */
            min-height: 100vh;
            padding: 50px 20px;
            overflow-x: hidden;
        }

        .back-nav {
            position: fixed;
            top: 30px;
            left: 30px;
            z-index: 100;
            display: block;
            padding: 8px;
            cursor: pointer;
            transform: rotate(-7deg);
            transition: all 0.3s ease-out;
        }

        .back-nav img {
            width: 140px;
            /* 保持你调整后的尺寸 */
            height: auto;
            display: block;
        }

        .back-nav:hover {
            transform: rotate(0deg) scale(1.1);
        }

        /* —————— 核心修改部分 —————— */
        .header {
            width: 100%;
            text-align: center;
            margin-top: 60px;
            margin-bottom: 40px;
        }

        .form-container {
            background: #1a1a1a;
            padding: 30px;
            border: 2px dashed #444;
            width: 100%;
            max-width: 600px;
            z-index: 10;
            margin: 0 auto 50px auto;
            /* 🌟 增加 margin: auto 确保块级元素居中 */
            text-align: left;
            /* 保持内部文字左对齐，更有档案感 */
        }

        /* ———————————————————————— */

        .poll-question {
            margin-bottom: 20px;
            font-size: 1.1rem;
        }

        .poll-options {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .poll-btn {
            flex: 1;
            padding: 10px;
            border: 1px solid #006b59;
            background: transparent;
            color: #ffffff;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }

        .poll-btn.active {
            background: #006b59;
            color: #ffffff;
            font-weight: bold;
        }

        textarea {
            width: 100%;
            height: 100px;
            background: #000;
            color: #fff;
            border: 1px solid #444;
            padding: 10px;
            font-family: inherit;
            box-sizing: border-box;
            margin-bottom: 20px;
            resize: none;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: transparent;
            color: #fff;
            border: 1px solid #006b59;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
            text-transform: uppercase;
        }

        .submit-btn:hover {
            background: #006b59;
        }

        #message-wall {
            position: relative;
            width: 100%;
            max-width: 1200px;
            min-height: 400px;
            margin: 0 auto;
            /* 🌟 确保留言墙本身也居中 */
        }

        .note {
            position: absolute;
            width: 200px;
            padding: 15px;
            background: #e6e6e6;
            color: #000;
            box-shadow: 5px 5px 15px rgba(0, 0, 0, 0.5);
            font-size: 0.9rem;
            word-wrap: break-word;
            transition: transform 0.3s;
        }

        .note:hover {
            transform: scale(1.1) rotate(0deg) !important;
            z-index: 100;
        }

        .note .choice {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            text-transform: uppercase;
            font-size: 0.7rem;
            border-bottom: 1px solid #ccc;
        }

        /* 滑动引导样式 */
        .scroll-hint {
            position: fixed;
            /* 固定在屏幕底部，不随页面滚动消失 */
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: #006b59;
            /* 使用和你按钮一样的深绿色，或者用 #ffff00 亮黄色 */
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.8rem;
            font-weight: bold;
            letter-spacing: 2px;
            z-index: 999;
            pointer-events: none;
            /* 确保它不挡住鼠标点击海报 */
            background: rgba(5, 5, 5, 0.7);
            /* 给文字加一点点半透明黑底，防止被海报挡住看不清 */
            padding: 10px 20px;
            border: 1px dashed #444;
        }

        .scroll-hint span {
            display: block;
            font-size: 1.2rem;
            margin-top: 5px;
            animation: bounce 2s infinite;
            /* 跳动动画 */
        }

        /* 箭头跳动动画 */
        @keyframes bounce {

            0%,
            20%,
            50%,
            80%,
            100% {
                transform: translateY(0);
            }

            40% {
                transform: translateY(-10px);
            }

            60% {
                transform: translateY(-5px);
            }
        }

        /* 🌟 进阶：当用户往下滚动一点点后，这个指引自动消失 */
        .scroll-hint.hidden {
            opacity: 0;
            transition: opacity 0.5s ease;
        }
    </style>
</head>

<body>

    <a href="home.html" class="back-nav"><img src="home.png" alt="Home"></a>

    <div class="header">
        <h1>THE GUESTBOOK</h1>
        <p>[ VOICES FROM THE VOID ]</p>
    </div>
    <div class="form-container">
        <div class="poll-question">After watching this, IMA is...</div>
        <div class="poll-options">
            <button class="poll-btn" onclick="setChoice('CLEARER')">CLEARER</button>
            <button class="poll-btn" onclick="setChoice('BLURRIER')">BLURRIER</button>
        </div>

        <textarea id="comment" placeholder="Explain why? (or just leave a mark)"></textarea>
        <button class="submit-btn" onclick="saveMessage()">SUBMIT</button>
    </div>

    <div id="message-wall"></div>
    <div class="scroll-hint" id="scrollHint">
        SCROLL DOWN TO VIEW THE THOUGHTS
        <span>↓</span>
    </div>
    <script>
        let currentChoice = "";

        function setChoice(val) {
            currentChoice = val;
            document.querySelectorAll('.poll-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.innerText === val) btn.classList.add('active');
            });
        }

        function saveMessage() {
            const comment = document.getElementById('comment').value;
            if (!currentChoice) { alert("Please pick an option first!"); return; }

            const newMessage = {
                choice: currentChoice,
                text: comment,
                left: Math.random() * 80 + "%",
                top: Math.random() * 300 + "px",
                rotate: (Math.random() * 20 - 10) + "deg"
            };

            let history = JSON.parse(localStorage.getItem('ima_messages')) || [];
            history.push(newMessage);
            localStorage.setItem('ima_messages', JSON.stringify(history));

            document.getElementById('comment').value = "";
            renderMessages();
        }

        function renderMessages() {
            const wall = document.getElementById('message-wall');
            const history = JSON.parse(localStorage.getItem('ima_messages')) || [];
            wall.innerHTML = "";

            history.forEach(msg => {
                const note = document.createElement('div');
                note.className = 'note';
                note.style.left = msg.left;
                note.style.top = msg.top;
                note.style.transform = `rotate(${msg.rotate})`;

                if (msg.choice === 'CLEARER') note.style.background = "#fff";
                else note.style.background = "#ffff88";

                note.innerHTML = `
                    <span class="choice">${msg.choice}</span>
                    ${msg.text}
                `;
                wall.appendChild(note);
            });
        }

        window.onload = renderMessages;
        
        window.onscroll = function () {
            const hint = document.getElementById('scrollHint');
            if (window.scrollY > 100) { // 滚动超过100像素就隐藏
                hint.style.opacity = "0";
            } else {
                hint.style.opacity = "1";
            }
        };
    </script>
</body>

</html>
