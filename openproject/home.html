<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What is IMA? Entrance</title>
    <style>
        body {
            background-color: #050505;
            color: white;
            font-family: 'Georgia', serif; 
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        
        .collage-canvas {
            position: relative;
            width: 90vw; 
            height: 70vh; 
        }

        .word-box {
            position: absolute; 
            display: flex;
            flex-direction: column;
            align-items: center;
            /* —————— 新增 1：让鼠标变成小手，暗示可以点击 —————— */
            cursor: pointer; 
            transition: all 0.3s ease;
            z-index: 1; 
        }

        /* —————— 新增 2：悬浮时出现的黄色“小纸条”提示 —————— */
        .enter-label {
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            background: #ffff09; /* 亮黄色 */
            color: #000;
            padding: 2px 10px;
            position: absolute;
            top: -40px; /* 浮在单词上方 */
            opacity: 0;
            transition: all 0.3s ease;
            transform: translateY(10px);
            white-space: nowrap;
            font-weight: bold;
            box-shadow: 3px 3px 0px #444;
            pointer-events: none;
        }

        /* 悬停在 box 上时，纸条浮现 */
        .word-box:hover .enter-label {
            opacity: 1;
            transform: translateY(0);
        }

        .word-img {
            height: 110px;
            width: auto;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5));
            transition: all 0.3s ease;
        }

        .zh-subtitle {
            margin-top: 15px;
            font-size: 1.3rem;
            opacity: 0.8;
            letter-spacing: 5px;
            font-family: sans-serif; 
            color: #eee;
        }

        /* Hover 交互：其他变暗，当前放大并归正 */
        .collage-canvas:hover .word-box {
            opacity: 0.15;
            filter: blur(5px);
        }

        .collage-canvas .word-box:hover {
            opacity: 1;
            filter: blur(0);
            transform: scale(1.18) rotate(0deg) !important;
            z-index: 99; 
        }

        /* 每个词的初始位置（保持不变） */
        #box-interactive { top: 15%; left: 8%; transform: rotate(-10deg); }
        #box-media { top: 55%; left: 36%; transform: rotate(5deg); }
        #box-arts { top: 12%; right: 12%; transform: rotate(-2deg); }

        /* 语录显示区 */
        #quote-display {
            position: fixed;
            bottom: 5vh;
            left: 50%;
            transform: translateX(-50%);
            width: 75vw;
            font-size: 1.2rem;
            line-height: 1.8;
            opacity: 0;
            transition: opacity 0.4s ease;
            color: #fff;
            text-align: center;
            background: rgba(0,0,0,0.85);
            padding: 25px;
            border-radius: 12px;
            pointer-events: none; 
            border: 1px solid #333;
        }
    </style>
</head>
<body>

    <div class="collage-canvas">
        
        <div class="word-box" id="box-interactive" 
             onclick="location.href='guestbook.html'" 
             data-quote="“我觉得最核心的是交互，万物皆可交互。” — Magnus <br> “交互在中文里太窄了，听起来像做 UI 的。” — Cecilia">
            <div class="enter-label">[ CLICK TO LEAVE A WORD ]</div>
            <img src="interactive.png" alt="Interactive" class="word-img">
            <span class="zh-subtitle">交互</span>
        </div>
        
        <div class="word-box" id="box-media" 
             onclick="location.href='archive.html'" 
             data-quote="“Media 更接近新闻传媒，我高中以为是去电视台的。” — Rebecca <br> “媒体就是通过新闻等渠道传播出去。” — 爷爷">
            <div class="enter-label">[ CLICK TO OPEN INTERVIEW ARCHIVES ]</div>
            <img src="media.png" alt="Media" class="word-img">
            <span class="zh-subtitle">媒体</span>
        </div>
        
        <div class="word-box" id="box-arts" 
             onclick="location.href='video.html'" 
             data-quote="“在中国，家长不想为莫名其妙的艺术买单。” — Rebecca <br> “学艺术可以提高素养，做生意时显得素质高些。” — 爷爷">
            <div class="enter-label">[ CLICK TO VIEW FINAL WORK ]</div>
            <img src="arts.png" alt="Arts" class="word-img">
            <span class="zh-subtitle">艺术</span>
        </div>

    </div>

    <div id="quote-display"></div>

    <script>
        const wordBoxes = document.querySelectorAll('.word-box');
        const quoteDisplay = document.getElementById('quote-display');

        wordBoxes.forEach(box => {
            box.addEventListener('mouseenter', () => {
                quoteDisplay.innerHTML = box.getAttribute('data-quote');
                quoteDisplay.style.opacity = '1';
            });

            box.addEventListener('mouseleave', () => {
                quoteDisplay.style.opacity = '0';
            });
        });
    </script>
</body>
</html>
