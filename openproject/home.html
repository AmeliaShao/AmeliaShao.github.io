<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What is IMA? Entrance</title>
    <style>
        body {
            background-color: #050505;
            color: white;
            font-family: 'Courier New','Georgia', serif; 
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        
        .collage-canvas {
            position: relative;
            width: 90vw; 
            height: 70vh; 
        }

        .word-box {
            position: absolute; 
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer; 
            transition: all 0.3s ease;
            z-index: 1; 
        }

        /* —————— 修改点 1：删除了 pointer-events: none; —————— */
        .enter-label {
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            background: #ffff09; 
            color: #000;
            padding: 2px 10px;
            position: absolute;
            top: -40px; 
            opacity: 0;
            transition: all 0.3s ease;
            transform: translateY(10px);
            white-space: nowrap;
            font-weight: bold;
            box-shadow: 3px 3px 0px #444;
            /* pointer-events: none; 被删除，允许鼠标交互 */
        }

        /* —————— 修改点 2：隐形桥梁，防止鼠标往上移时纸条消失 —————— */
        .enter-label::after {
            content: '';
            position: absolute;
            top: 100%; /* 紧贴纸条底部 */
            left: 0;
            width: 100%;
            height: 40px; /* 完美填补 top: -40px 留下的真空区 */
        }

        .word-box:hover .enter-label {
            opacity: 1;
            transform: translateY(0);
        }

        .word-img {
            height: 110px;
            width: auto;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5));
            transition: all 0.3s ease;
        }

        .zh-subtitle {
            margin-top: 15px;
            font-size: 1.3rem;
            opacity: 0.8;
            letter-spacing: 5px;
            font-family: sans-serif; 
            color: #eee;
        }

        .collage-canvas:hover .word-box {
            opacity: 0.15;
            filter: blur(5px);
        }

        .collage-canvas .word-box:hover {
            opacity: 1;
            filter: blur(0);
            transform: scale(1.18) rotate(0deg) !important;
            z-index: 99; 
        }

        #box-interactive { top: 15%; left: 8%; transform: rotate(-10deg); }
        #box-media { top: 55%; left: 36%; transform: rotate(5deg); }
        #box-arts { top: 12%; right: 12%; transform: rotate(-2deg); }
/* 基础语录显示区（去掉了固定的位置属性） */
        #quote-display {
            position: fixed;
            width: 35vw; /* 限制宽度，让中英文自动换行，不显得太长 */
            font-size: 1.05rem;
            line-height: 1.6;
            opacity: 0;
            transition: opacity 0.4s ease; 
            color: #fff;
            background: rgba(10, 10, 10, 0.9);
            padding: 20px 25px;
            pointer-events: none; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.8);
            z-index: 10; 
        }

        /* 🌟 针对 Interactive -> 放在左下角 */
        #quote-display.pos-interactive {
            bottom: 8vh;
            left: 5vw;
            text-align: left;
            border-left: 3px solid #ffff00; /* 加个小黄边呼应 */
        }

        /* 🌟 针对 Media -> 放在顶部中间 */
        #quote-display.pos-media {
            top: 8vh;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            border-top: 3px solid #ffff00;
            width: 45vw; /* Media 的字比较多，给宽一点 */
        }

        /* 🌟 针对 Arts -> 放在右下角 */
        #quote-display.pos-arts {
            bottom: 8vh;
            right: 5vw;
            text-align: right;
            border-right: 3px solid #ffff00;
        }

        
    </style>
</head>
<body>

    <div class="collage-canvas">
        
        <div class="word-box" id="box-interactive" 
             onclick="location.href='guestbook.html'" 
             data-quote="“Anything can be interative。” — Magnus <br> <br>
             “Interactive in Chinese has very limited meaning.”<br>“交互在中文里太窄了。” — Candy">
            <div class="enter-label">[ LEAVE A WORD ]</div>
            <img src="interactive.png" alt="Interactive" class="word-img">
            <span class="zh-subtitle">交互</span>
        </div>
        
        <div class="word-box" id="box-media" 
             onclick="location.href='archive.html'" 
             data-quote="“Media in Chinese is closer to the press.”<br> “Media 更接近新闻传媒，我高中以为是去电视台的。” — Rebecca <br> <br>
             “Media? That's news, right?” <br>
             “媒体么，就是新闻呀。” — My grandpa/爷爷"> 
            
            <div class="enter-label">[ DIVE DEEP IN DETAILS OF INTERVIEWS ]</div>
            <img src="media.png" alt="Media" class="word-img">
            <span class="zh-subtitle">媒体</span>
        </div>
        
        <div class="word-box" id="box-arts" 
             onclick="location.href='video.html'" 
             data-quote="“Art, always feele like fine art in Chinese“<br>
             “艺术总感觉是在说fine art。” — Rebecca <br> <br>
             “Art can improve your profile and help with your business.” <br>
             “学艺术可以提高素养，做生意时显得素质高些。” <br>
             — My grandpa/爷爷">
            <div class="enter-label">[ VIEW THE MAIN VIDEO ]</div>
            <img src="arts.png" alt="Arts" class="word-img">
            <span class="zh-subtitle">艺术</span>
        </div> </div>

    <div id="quote-display"></div>

    <script>
        const wordBoxes = document.querySelectorAll('.word-box');
        const quoteDisplay = document.getElementById('quote-display');

        wordBoxes.forEach(box => {
            box.addEventListener('mouseenter', () => {
                // 自动识别当前的单词是什么 (从 'box-interactive' 里提取 'interactive')
                const type = box.id.split('-')[1]; 
                
                // 赋予它对应的位置排版 class
                quoteDisplay.className = 'pos-' + type;
                
                // 填入中英文翻译内容
                quoteDisplay.innerHTML = box.getAttribute('data-quote');
                quoteDisplay.style.opacity = '1';
            });

            box.addEventListener('mouseleave', () => {
                quoteDisplay.style.opacity = '0';
                // 稍微延迟清除 class，防止动画闪烁
                setTimeout(() => {
                    if (quoteDisplay.style.opacity === '0') {
                        quoteDisplay.className = ''; 
                    }
                }, 400);
            });
        });
    </script>
</body>
</html>
