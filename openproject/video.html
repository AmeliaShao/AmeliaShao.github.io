<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Final Cut | IMA Deconstructed</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            /* 🌟 全局标题字体修改 */
            font-family: 'Courier New', Courier, monospace; 
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .back-nav {
            position: fixed;
            top: 30px; /* 稍微往下移一点，避免太靠边 */
            left: 30px;
            z-index: 100;
            display: block;
           
            padding: 8px;
          
            cursor: pointer;

            /* 🌟 1. 初始状态：倾斜 */
            transform: rotate(-7deg); /* 向左倾斜，你可以调整这个度数 */
            
            /* 🌟 2. 核心：所有属性的变化都要有一个平滑的过渡效果 */
            transition: all 0.3s ease-out; /* 0.3秒平滑过渡 */
        }

        .back-nav img {
            width: 140px; 
            height: auto;
            display: block;
        }

        /* 🌟 3. 悬停状态 (Hover)：变正、稍微放大 */
        .back-nav:hover {
            transform: rotate(0deg) scale(1.1); /* 归正到0度，并微微放大1.1倍 */
          
        
        }
        /* ———————————————————————————————————————————— */

        .video-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .video-header h1 {
            /* 🌟 标题字体确保生效 */
            font-family: 'Courier New', Courier, monospace;
            font-size: 2.8rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin: 0;
           
        }

        .video-header p {
            color: #888;
            margin-top: 10px;
            letter-spacing: 2px;
        }

        /* 视频容器 */
        .video-wrapper {
            width: 90vw;
            max-width: 1000px;
            aspect-ratio: 16 / 9;
            background: #111;
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.1);
            border: 1px solid #333;
            margin-bottom: 50px;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 作者自述区域 */
        .statement-container {
            max-width: 700px;
            line-height: 1.8;
            color: #ccc;
            background: rgba(20, 20, 20, 0.8);
            padding: 40px;
            border-left: 3px solid #b01d00;
            margin-bottom: 100px;
            /* 正文可以保留带衬线的 Georgia 增加阅读舒适度，或者也改掉 */
            font-family: 'Georgia', serif; 
        }

        .statement-container h2 {
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.2rem;
            color: #ffffff;
            margin-top: 0;
            text-transform: uppercase;
        }

        .footer {
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.8rem;
            color: #444;
            margin-bottom: 20px;
        }

    </style>
</head>
<body>

    <a href="home.html" class="back-nav">
        <img src="home.png" alt="Home">
    </a>

    <div class="video-header">
        <h1>The Final Work</h1>
    </div>

    <div class="video-wrapper">
        <iframe 
            src="https://www.youtube.com/embed/YOUR_FINAL_VIDEO_ID" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            referrerpolicy="strict-origin-when-cross-origin"
            allowfullscreen>
        </iframe>
    </div>

    <div class="statement-container">
        <h2>Artist Statement</h2>
        <div class="statement-text">
            [在这里输入你的文字内容...]
        </div>
    </div>

    <div class="footer">
        © 2024 IMA DECONSTRUCTED PROJECT BY YOURNAME
    </div>

</body>
</html>
